<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sapiens & Co. | ポーカーツール & アプリ</title>
<meta name="description" content="Sapiens & Co. はポーカープレイヤーのためのツールを開発しています。Poker Hand Logger でセッション・ハンドを簡単に記録。">
<meta property="og:title" content="Sapiens & Co.">
<meta property="og:description" content="ポーカープレイヤーのためのツール">
<meta property="og:image" content="https://sapiens-and-co.com/assets/og-image.png">
<meta property="og:url" content="https://sapiens-and-co.com">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<link rel="icon" href="/assets/mascot.png" type="image/png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#fafafa;
  --surface:#ffffff;
  --text:#1a1a2e;
  --text-dim:#6b7280;
  --accent:#f0d830;
  --accent-hover:#d4be20;
  --border:#e5e7eb;
}
html{scroll-behavior:smooth}
body{
  font-family:"Inter","Hiragino Kaku Gothic ProN","Noto Sans JP","Meiryo",sans-serif;
  background:var(--bg);
  color:var(--text);
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
}

/* ===== Hero ===== */
.hero{
  min-height:60vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:60px 24px 40px;
  text-align:center;
}
.hero-mascot{
  width:80px;
  height:80px;
  margin-bottom:20px;
  animation:fadeIn .8s ease;
}
.hero-brand{
  font-size:2rem;
  font-weight:700;
  letter-spacing:-.02em;
  margin-bottom:8px;
}
.hero-tagline{
  font-size:1rem;
  color:var(--text-dim);
  font-weight:400;
  letter-spacing:.04em;
}
.scroll-hint{
  margin-top:40px;
  opacity:.3;
  animation:bounce 2s ease infinite;
}
.scroll-hint svg{width:24px;height:24px}

@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(6px)}}

/* ===== Section ===== */
.section{
  max-width:720px;
  margin:0 auto;
  padding:0 24px 80px;
}
.section-title{
  font-size:1.125rem;
  font-weight:600;
  color:var(--text-dim);
  letter-spacing:.08em;
  text-transform:uppercase;
  margin-bottom:24px;
}

/* ===== App Card Grid ===== */
.app-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:20px;
}
.app-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px;
  padding:28px 24px;
  transition:transform .2s,box-shadow .2s;
  display:flex;
  flex-direction:column;
  gap:12px;
}
.app-card:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 24px rgba(0,0,0,.06);
}
.app-card-header{
  display:flex;
  align-items:center;
  gap:14px;
}
.app-icon{
  width:56px;
  height:56px;
  border-radius:12px;
  flex-shrink:0;
}
.app-name{
  font-size:1.125rem;
  font-weight:700;
}
.app-badge{
  display:inline-block;
  font-size:.6875rem;
  font-weight:600;
  color:var(--accent-hover);
  background:rgba(240,216,48,.15);
  padding:2px 8px;
  border-radius:4px;
  margin-top:2px;
}
.app-desc{
  font-size:.9375rem;
  color:var(--text-dim);
  line-height:1.7;
}
.app-cta{
  display:inline-flex;
  align-items:center;
  gap:6px;
  background:var(--accent);
  color:var(--text);
  font-weight:700;
  font-size:.875rem;
  padding:10px 24px;
  border-radius:8px;
  text-decoration:none;
  transition:background .2s;
  align-self:flex-start;
  margin-top:4px;
}
.app-cta:hover{background:var(--accent-hover)}
.app-cta svg{width:16px;height:16px}

/* ===== Footer ===== */
.footer{
  text-align:center;
  padding:32px 24px;
  color:var(--text-dim);
  font-size:.8125rem;
  border-top:1px solid var(--border);
}

/* ===== Responsive ===== */
@media(min-width:640px){
  .hero{padding:80px 32px 60px}
  .hero-brand{font-size:2.5rem}
  .section{padding:0 32px 100px}
}
</style>
</head>
<body>

<!-- Hero -->
<section class="hero">
  <img class="hero-mascot" src="assets/mascot.png" alt="Sapiens & Co. mascot" width="80" height="80">
  <h1 class="hero-brand">Sapiens & Co.</h1>
  <p class="hero-tagline">つくる、つかう、たのしむ。</p>
  <div class="scroll-hint">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="6 9 12 15 18 9"/>
    </svg>
  </div>
</section>

<!-- Products -->
<section class="section">
  <h2 class="section-title">Products</h2>
  <div class="app-grid">

    <!-- Poker Hand Logger -->
    <article class="app-card">
      <div class="app-card-header">
        <img class="app-icon" src="assets/app-poker.png" alt="Poker Hand Logger" width="56" height="56">
        <div>
          <h3 class="app-name">Sapiens Poker Logger</h3>
          <span class="app-badge">PWA</span>
        </div>
      </div>
      <p class="app-desc">ポーカーのハンド履歴をスマホで素早く記録。セッション管理・トリップ管理に対応したハンドロガーです。</p>
      <a class="app-cta" href="/Sapiens-Poker-Logger/">
        アプリを開く
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
        </svg>
      </a>
    </article>

    <!-- Future apps: copy the <article class="app-card"> block above -->

  </div>
</section>

<!-- Footer -->
<footer class="footer">
  &copy; 2026 Sapiens & Co.
</footer>

</body>
</html>
